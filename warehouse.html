<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Data Warehouse Architecture</title>
    <link rel="stylesheet" href="src/animation.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="page">
      <header>
        <h1>Accountancy Enterprise Data Architecture</h1>
        <p>
          Sources feed a central data warehouse, powering automations, reporting and AI use cases
        </p>
      </header>

      <div class="diagram-wrap">
        <svg
          viewBox="0 0 1280 740"
          role="img"
          aria-label="Animated data warehouse architecture diagram"
        >
          <defs>
            <linearGradient id="lob-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#e0f2fe" />
              <stop offset="100%" stop-color="#f0f9ff" />
            </linearGradient>
            <linearGradient id="practice-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#ccfbf1" />
              <stop offset="100%" stop-color="#f0fdfa" />
            </linearGradient>
            <linearGradient id="public-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#ede9fe" />
              <stop offset="100%" stop-color="#f5f3ff" />
            </linearGradient>
            <linearGradient id="warehouse-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ecfdf5" />
              <stop offset="100%" stop-color="#f0fdf4" />
            </linearGradient>
            <linearGradient id="automation-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#fffbeb" />
              <stop offset="100%" stop-color="#fefce8" />
            </linearGradient>
            <linearGradient id="bi-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#eef2ff" />
              <stop offset="100%" stop-color="#f5f7ff" />
            </linearGradient>
            <linearGradient id="ai-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#fdf4ff" />
              <stop offset="100%" stop-color="#faf5ff" />
            </linearGradient>
          </defs>

          <!-- LoB section (arc right) -->
          <rect x="40" y="40" width="300" height="290" fill="#f8fafc" stroke="#bae6fd" />
          <text
            x="56"
            y="72"
            fill="#0369a1"
            font-size="13"
            font-weight="700"
            letter-spacing="0.04em"
          >
            LINE OF BUSINESS APPLICATIONS
          </text>
          <text x="56" y="94" fill="#64748b" font-size="11">
            Business users generating operational data
          </text>

          <!-- Practice management section (arc left) -->
          <rect x="12" y="350" width="300" height="140" fill="#f0fdfa" stroke="#99f6e4" />
          <text
            x="28"
            y="382"
            fill="#0f766e"
            font-size="13"
            font-weight="700"
            letter-spacing="0.04em"
          >
            PRACTICE MANAGEMENT SOFTWARE
          </text>
          <text x="28" y="404" fill="#64748b" font-size="11">
            Firm operations, client work and revenue data
          </text>

          <!-- Public section (arc right) -->
          <rect x="40" y="510" width="300" height="210" fill="#faf5ff" stroke="#ddd6fe" />
          <text
            x="56"
            y="542"
            fill="#6d28d9"
            font-size="13"
            font-weight="700"
            letter-spacing="0.04em"
          >
            PUBLIC DATA SOURCES
          </text>
          <text x="56" y="564" fill="#64748b" font-size="11">
            External registers and open government data
          </text>

          <!-- Use cases section -->
          <rect x="800" y="40" width="440" height="660" fill="#f8fafc" stroke="#cbd5e1" />
          <text
            x="816"
            y="72"
            fill="#334155"
            font-size="13"
            font-weight="700"
            letter-spacing="0.04em"
          >
            USE CASES
          </text>
          <text x="816" y="94" fill="#64748b" font-size="11">
            Consumption of warehouse data across the firm
          </text>

          <g id="automations" class="use-case-box">
            <rect
              x="820"
              y="116"
              width="400"
              height="168"
              fill="url(#automation-gradient)"
              stroke="#d97706"
              stroke-width="1.5"
            />
            <text x="836" y="144" fill="#92400e" font-size="14" font-weight="700">Automations</text>
            <text x="836" y="168" fill="#64748b" font-size="11">Syncing data between systems</text>
            <text x="836" y="186" fill="#64748b" font-size="11">Sending event-driven emails</text>
          </g>

          <g id="business-intelligence" class="use-case-box">
            <rect
              x="820"
              y="304"
              width="400"
              height="196"
              fill="url(#bi-gradient)"
              stroke="#4f46e5"
              stroke-width="1.5"
            />
            <text x="836" y="332" fill="#312e81" font-size="14" font-weight="700">
              Business Intelligence Reporting
            </text>
            <text x="836" y="356" fill="#64748b" font-size="11">
              Power BI dashboards and reports
            </text>
            <text x="836" y="374" fill="#64748b" font-size="11">
              Management reporting and service line dashboards
            </text>
            <text x="836" y="392" fill="#64748b" font-size="11">
              Finance team analysis and monitoring
            </text>
          </g>

          <g id="ai-use-case" class="use-case-box">
            <rect
              x="820"
              y="520"
              width="400"
              height="156"
              fill="url(#ai-gradient)"
              stroke="#a21caf"
              stroke-width="1.5"
            />
            <text x="836" y="548" fill="#701a75" font-size="14" font-weight="700">AI</text>
            <text x="836" y="572" fill="#64748b" font-size="11">
              Providing accurate business context
            </text>
            <text x="836" y="590" fill="#64748b" font-size="11">for LLMs and agents</text>
          </g>

          <!-- LoB source boxes -->
          <g id="payroll" class="source-box">
            <rect
              x="64"
              y="108"
              width="252"
              height="58"
              fill="url(#lob-gradient)"
              stroke="#0284c7"
              stroke-width="1.5"
            />
            <text x="80" y="134" fill="#0c4a6e" font-size="13" font-weight="600">
              Payroll Software
            </text>
            <text x="80" y="152" fill="#64748b" font-size="10">
              Payslips, tax, pensions, RTI submissions
            </text>
          </g>

          <g id="accounts" class="source-box">
            <rect
              x="64"
              y="180"
              width="252"
              height="58"
              fill="url(#lob-gradient)"
              stroke="#0284c7"
              stroke-width="1.5"
            />
            <text x="80" y="206" fill="#0c4a6e" font-size="13" font-weight="600">
              Accounts Software
            </text>
            <text x="80" y="224" fill="#64748b" font-size="10">
              Ledgers, journals, VAT returns, bank feeds
            </text>
          </g>

          <g id="audit" class="source-box">
            <rect
              x="64"
              y="252"
              width="252"
              height="58"
              fill="url(#lob-gradient)"
              stroke="#0284c7"
              stroke-width="1.5"
            />
            <text x="80" y="278" fill="#0c4a6e" font-size="13" font-weight="600">
              Audit Software
            </text>
            <text x="80" y="296" fill="#64748b" font-size="10">
              Working papers, evidence, sign-off trails
            </text>
          </g>

          <!-- Practice management source -->
          <g id="practice-management" class="source-box">
            <rect
              x="36"
              y="420"
              width="252"
              height="58"
              fill="url(#practice-gradient)"
              stroke="#0d9488"
              stroke-width="1.5"
            />
            <text x="52" y="446" fill="#134e4a" font-size="13" font-weight="600">
              Practice Management Software
            </text>
            <text x="52" y="464" fill="#64748b" font-size="10">
              Timesheets, billing, cash received
            </text>
          </g>

          <!-- Public source boxes -->
          <g id="companies-house" class="source-box">
            <rect
              x="64"
              y="580"
              width="252"
              height="58"
              fill="url(#public-gradient)"
              stroke="#7c3aed"
              stroke-width="1.5"
            />
            <text x="80" y="606" fill="#4c1d95" font-size="13" font-weight="600">
              Companies House
            </text>
            <text x="80" y="624" fill="#64748b" font-size="10">
              Company filings, officers, PSC register
            </text>
          </g>

          <g id="charity-commission" class="source-box">
            <rect
              x="64"
              y="654"
              width="252"
              height="58"
              fill="url(#public-gradient)"
              stroke="#7c3aed"
              stroke-width="1.5"
            />
            <text x="80" y="680" fill="#4c1d95" font-size="13" font-weight="600">
              Charity Commission
            </text>
            <text x="80" y="698" fill="#64748b" font-size="10">
              Charity registers, accounts, trustees
            </text>
          </g>

          <!-- Inbound flow paths -->
          <path
            id="path-payroll"
            class="flow-line"
            d="M 316 137 C 390 137, 420 260, 450 300"
            fill="none"
            stroke="#0284c7"
            stroke-width="2"
            opacity="0.35"
          />
          <path
            id="path-accounts"
            class="flow-line"
            d="M 316 209 C 400 209, 430 290, 450 320"
            fill="none"
            stroke="#0284c7"
            stroke-width="2"
            opacity="0.35"
          />
          <path
            id="path-audit"
            class="flow-line"
            d="M 316 281 C 410 281, 440 330, 450 340"
            fill="none"
            stroke="#0284c7"
            stroke-width="2"
            opacity="0.35"
          />
          <path
            id="path-practice-management"
            class="flow-line"
            d="M 288 449 C 370 449, 420 390, 450 350"
            fill="none"
            stroke="#0d9488"
            stroke-width="2"
            opacity="0.35"
          />
          <path
            id="path-companies-house"
            class="flow-line"
            d="M 316 609 C 400 609, 440 450, 450 370"
            fill="none"
            stroke="#7c3aed"
            stroke-width="2"
            opacity="0.35"
          />
          <path
            id="path-charity-commission"
            class="flow-line"
            d="M 316 683 C 410 683, 450 480, 450 400"
            fill="none"
            stroke="#7c3aed"
            stroke-width="2"
            opacity="0.35"
          />

          <!-- Outbound flow paths -->
          <path
            id="path-out-automations"
            class="flow-line flow-line-out"
            d="M 730 300 C 770 260, 790 200, 820 200"
            fill="none"
            stroke="#16a34a"
            stroke-width="2"
            opacity="0.35"
          />
          <path
            id="path-out-bi"
            class="flow-line flow-line-out"
            d="M 730 360 C 770 360, 790 400, 820 402"
            fill="none"
            stroke="#16a34a"
            stroke-width="2"
            opacity="0.35"
          />
          <path
            id="path-out-ai"
            class="flow-line flow-line-out"
            d="M 730 420 C 770 460, 790 580, 820 598"
            fill="none"
            stroke="#16a34a"
            stroke-width="2"
            opacity="0.35"
          />

          <!-- Data warehouse -->
          <g class="warehouse-core">
            <rect
              x="450"
              y="160"
              width="280"
              height="400"
              fill="url(#warehouse-gradient)"
              stroke="#16a34a"
              stroke-width="2"
            />
            <text
              x="590"
              y="204"
              text-anchor="middle"
              fill="#14532d"
              font-size="20"
              font-weight="700"
            >
              Data Warehouse
            </text>
            <text x="590" y="228" text-anchor="middle" fill="#15803d" font-size="12">
              Central analytical store
            </text>

            <rect
              class="warehouse-layer"
              x="472"
              y="260"
              width="72"
              height="200"
              fill="#dcfce7"
              stroke="#86efac"
            />
            <text
              transform="translate(508 360) rotate(-90)"
              text-anchor="middle"
              fill="#166534"
              font-size="11"
              font-weight="600"
            >
              Staging
            </text>

            <rect
              class="warehouse-layer"
              x="554"
              y="260"
              width="72"
              height="200"
              fill="#bbf7d0"
              stroke="#4ade80"
            />
            <text
              transform="translate(590 360) rotate(-90)"
              text-anchor="middle"
              fill="#166534"
              font-size="11"
              font-weight="600"
            >
              Intermediate
            </text>

            <rect
              class="warehouse-layer"
              x="636"
              y="260"
              width="72"
              height="200"
              fill="#86efac"
              stroke="#22c55e"
            />
            <text
              transform="translate(672 360) rotate(-90)"
              text-anchor="middle"
              fill="#14532d"
              font-size="11"
              font-weight="600"
            >
              Mart
            </text>

            <text x="590" y="500" text-anchor="middle" fill="#64748b" font-size="11">
              SQL data transformation
            </text>
          </g>

          <!-- Loading indicator arrow -->
          <g transform="translate(400, 348)">
            <polygon points="0,0 14,8 0,16" fill="#16a34a" opacity="0.6" />
            <text x="6" y="32" text-anchor="middle" fill="#15803d" font-size="9">LOAD</text>
          </g>

          <!-- Serve indicator arrow -->
          <g transform="translate(760, 348)">
            <polygon points="0,0 14,8 0,16" fill="#16a34a" opacity="0.6" />
            <text x="6" y="32" text-anchor="middle" fill="#15803d" font-size="9">SERVE</text>
          </g>
        </svg>
      </div>
    </div>

    <script type="module" src="src/animation.ts"></script>
  </body>
</html>
